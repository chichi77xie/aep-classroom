<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AEP Classroom</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--surface:#181c27;--surface2:#1e2435;--border:#2a3045;--teal:#00c9a7;--teal-dim:rgba(0,201,167,0.12);--teal-glow:rgba(0,201,167,0.25);--gold:#ffd166;--coral:#ff6b6b;--text:#e8eaf0;--muted:#7a8299;--success:#00c9a7;--error:#ff6b6b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(0,201,167,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,201,167,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.bg-orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
.orb1{width:500px;height:500px;background:radial-gradient(circle,rgba(0,201,167,0.08),transparent 70%);top:-100px;right:-100px}
.orb2{width:400px;height:400px;background:radial-gradient(circle,rgba(255,107,107,0.06),transparent 70%);bottom:-80px;left:-80px}
.screen{display:none;min-height:100vh;position:relative;z-index:1}
.screen.active{display:flex;flex-direction:column}
/* LOGIN */
#login-screen{align-items:center;justify-content:center}
.login-wrap{width:100%;max-width:440px;padding:24px;animation:slideUp 0.5s cubic-bezier(.16,1,.3,1)}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.login-brand{text-align:center;margin-bottom:40px}
.brand-badge{display:inline-flex;align-items:center;gap:10px;background:var(--teal-dim);border:1px solid var(--teal-glow);border-radius:100px;padding:8px 20px;margin-bottom:20px}
.brand-dot{width:8px;height:8px;border-radius:50%;background:var(--teal);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(0.8)}}
.brand-badge span{font-size:13px;font-weight:600;color:var(--teal);letter-spacing:0.5px}
.login-brand h1{font-family:'DM Serif Display',serif;font-size:42px;line-height:1;margin-bottom:8px}
.login-brand h1 em{font-style:italic;color:var(--teal)}
.login-brand p{font-size:14px;color:var(--muted)}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px}
.role-switch{display:flex;background:var(--bg);border-radius:12px;padding:4px;margin-bottom:28px;gap:4px}
.role-btn{flex:1;padding:10px;border:none;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:13.5px;font-weight:600;cursor:pointer;transition:all .2s;background:transparent;color:var(--muted)}
.role-btn.active{background:var(--teal);color:#000}
.field{margin-bottom:16px}
.field label{display:block;font-size:11.5px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.field input,.field select{width:100%;padding:12px 16px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border .2s}
.field input:focus,.field select:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-dim)}
.field input::placeholder{color:var(--muted)}
.field select option{background:var(--surface)}
.enter-btn{width:100%;padding:14px;background:var(--teal);border:none;border-radius:12px;color:#000;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:all .2s}
.enter-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px var(--teal-glow)}
.code-note{font-size:12px;color:var(--muted);text-align:center;margin-top:14px}
.code-note strong{color:var(--teal)}
/* TOPBAR */
.topbar{height:60px;background:rgba(15,17,23,0.95);border-bottom:1px solid var(--border);backdrop-filter:blur(16px);display:flex;align-items:center;padding:0 28px;gap:16px;position:sticky;top:0;z-index:200;flex-shrink:0}
.topbar-logo{font-family:'DM Serif Display',serif;font-size:20px;color:var(--teal)}
.topbar-sep{width:1px;height:22px;background:var(--border)}
.topbar-title{font-size:13.5px;font-weight:500;color:var(--muted)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.user-chip{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:6px 14px}
.user-chip .uc-name{font-size:13px;font-weight:600}
.user-chip .uc-class{font-size:11.5px;color:var(--teal);font-weight:600}
.topbar-btn{padding:7px 16px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .15s}
.topbar-btn:hover{border-color:var(--coral);color:var(--coral)}
/* STUDENT */
.s-layout{display:flex;flex:1;min-height:0;overflow:hidden}
.s-sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:20px 12px;overflow-y:auto}
.s-sidebar-label{font-size:10.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:8px 12px;margin-bottom:4px}
.s-nav-item{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:10px;cursor:pointer;transition:all .15s;color:var(--muted);font-size:13.5px;font-weight:500;margin-bottom:3px;position:relative}
.s-nav-item:hover{background:var(--surface2);color:var(--text)}
.s-nav-item.active{background:var(--teal-dim);color:var(--teal);border:1px solid rgba(0,201,167,0.2)}
.ni-done{width:7px;height:7px;border-radius:50%;background:var(--teal);position:absolute;right:12px;top:50%;transform:translateY(-50%)}
.s-content{flex:1;overflow-y:auto;padding:32px 36px}
.a-header{margin-bottom:28px}
.a-header h2{font-family:'DM Serif Display',serif;font-size:30px;margin-bottom:6px}
.a-header p{font-size:14px;color:var(--muted)}
.sec{margin-bottom:36px}
.sec-title{font-size:11.5px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--teal);padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:18px;display:flex;align-items:center;gap:8px}
/* vocab */
.vocab-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.vocab-row{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px}
.vocab-word{font-weight:600;font-size:13.5px;min-width:120px}
.v-input{flex:1;background:transparent;border:none;border-bottom:1.5px solid var(--border);padding:4px 8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border .2s}
.v-input:focus{border-bottom-color:var(--teal)}
.v-input.correct{border-bottom-color:var(--teal);color:var(--teal)}
.v-input.incorrect{border-bottom-color:var(--coral);color:var(--coral)}
/* fill blanks */
.sentence-wrap{font-size:15px;line-height:2.5;margin-bottom:8px}
.b-input{background:transparent;border:none;border-bottom:1.5px solid var(--teal);color:var(--teal);font-family:'DM Sans',sans-serif;font-size:15px;padding:2px 10px;min-width:100px;outline:none;transition:all .2s}
.b-input:focus{border-bottom-color:var(--gold)}
.b-input.correct{color:var(--success);border-bottom-color:var(--success)}
.b-input.incorrect{color:var(--error);border-bottom-color:var(--error)}
/* matching */
.match-grid{display:grid;gap:8px}
.match-row2{display:grid;grid-template-columns:1fr 1fr;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.match-term{padding:13px 18px;font-weight:600;font-size:14px;border-right:1px solid var(--border);display:flex;align-items:center}
.match-sel{padding:8px 12px;display:flex;align-items:center}
.match-sel select{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 10px;outline:none;transition:border .2s}
.match-sel select:focus{border-color:var(--teal)}
.match-sel select.correct{border-color:var(--teal);color:var(--teal)}
.match-sel select.incorrect{border-color:var(--coral);color:var(--coral)}
/* mcq */
.mcq-block{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:10px}
.mcq-q{font-size:15px;font-weight:500;margin-bottom:14px}
.mcq-opts{display:flex;flex-direction:column;gap:8px}
.mcq-opt{display:flex;align-items:center;gap:12px;padding:11px 16px;border:1.5px solid var(--border);border-radius:9px;cursor:pointer;transition:all .15s;font-size:14px;color:var(--muted)}
.mcq-opt:hover{border-color:var(--teal);color:var(--text);background:var(--teal-dim)}
.mcq-opt input{accent-color:var(--teal);width:15px;height:15px;flex-shrink:0}
.mcq-opt.correct{border-color:var(--teal);background:var(--teal-dim);color:var(--teal)}
.mcq-opt.incorrect{border-color:var(--coral);background:rgba(255,107,107,0.1);color:var(--coral)}
/* t/f */
.tf-block{display:flex;justify-content:space-between;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 18px;margin-bottom:8px;gap:16px}
.tf-stmt{font-size:14px;flex:1}
.tf-btns{display:flex;gap:8px;flex-shrink:0}
.tf-b{padding:7px 20px;border:1.5px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.tf-b:hover{border-color:var(--teal);color:var(--teal)}
.tf-b.sel-t{background:var(--teal);border-color:var(--teal);color:#000}
.tf-b.sel-f{background:var(--coral);border-color:var(--coral);color:#fff}
.tf-block.correct{border-color:var(--teal);background:var(--teal-dim)}
.tf-block.incorrect{border-color:var(--coral);background:rgba(255,107,107,0.08)}
/* categorize */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cat-row{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px}
.cat-word{font-weight:600;font-size:14px;min-width:90px}
.cat-sel{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 10px;outline:none;transition:border .2s}
.cat-sel:focus{border-color:var(--teal)}
.cat-sel.correct{border-color:var(--teal);color:var(--teal)}
.cat-sel.incorrect{border-color:var(--coral);color:var(--coral)}
/* short answer */
.short-block{margin-bottom:16px}
.short-block p{font-size:15px;margin-bottom:9px}
.short-block textarea{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:13px 16px;resize:vertical;min-height:80px;outline:none;transition:border .2s}
.short-block textarea:focus{border-color:var(--teal)}
/* submit */
.submit-area{padding:24px 0 8px;border-top:1px solid var(--border);display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-top:8px}
.sub-btn{padding:13px 32px;background:var(--teal);border:none;border-radius:11px;color:#000;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s}
.sub-btn:hover{box-shadow:0 8px 24px var(--teal-glow);transform:translateY(-1px)}
.sub-btn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;transform:none;box-shadow:none}
.score-tag{padding:8px 18px;border-radius:100px;font-size:14px;font-weight:700}
.score-tag.hi{background:rgba(0,201,167,0.15);color:var(--teal);border:1px solid rgba(0,201,167,0.3)}
.score-tag.mid{background:rgba(255,209,102,0.15);color:var(--gold);border:1px solid rgba(255,209,102,0.3)}
.score-tag.lo{background:rgba(255,107,107,0.15);color:var(--coral);border:1px solid rgba(255,107,107,0.3)}
.sub-note{font-size:13px;color:var(--muted)}
/* TEACHER */
.dash-wrap{display:flex;flex:1;min-height:0;overflow:hidden}
.dash-sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:20px 12px}
.ds-label{font-size:10.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:8px 12px;margin-bottom:4px}
.ds-item{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:10px;cursor:pointer;transition:all .15s;color:var(--muted);font-size:13.5px;font-weight:500;margin-bottom:3px}
.ds-item:hover{background:var(--surface2);color:var(--text)}
.ds-item.active{background:var(--teal-dim);color:var(--teal);border:1px solid rgba(0,201,167,0.2)}
.ds-item .di-icon{font-size:16px}
.dash-main{flex:1;overflow-y:auto;padding:32px 36px}
.dash-main h2{font-family:'DM Serif Display',serif;font-size:28px;margin-bottom:22px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.stat-c{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 22px}
.stat-c .sl{font-size:11.5px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);font-weight:600;margin-bottom:10px}
.stat-c .sv{font-family:'DM Serif Display',serif;font-size:38px;line-height:1}
.stat-c .ss{font-size:12px;color:var(--muted);margin-top:5px}
.stat-c.hi .sv{color:var(--teal)}
.fbar{display:flex;gap:10px;margin-bottom:18px;align-items:center;flex-wrap:wrap}
.fbar label{font-size:13px;color:var(--muted);font-weight:500}
.fbar select,.fbar input{background:var(--surface);border:1.5px solid var(--border);border-radius:9px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 13px;outline:none;transition:border .2s}
.fbar select:focus,.fbar input:focus{border-color:var(--teal)}
.fbar select option{background:var(--surface)}
.fbar-count{margin-left:auto;font-size:13px;color:var(--muted)}
.filter-btn{padding:9px 18px;background:var(--teal);border:none;border-radius:9px;color:#000;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.refresh-btn{padding:9px 16px;background:transparent;border:1.5px solid var(--border);border-radius:9px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .2s}
.refresh-btn:hover{border-color:var(--teal);color:var(--teal)}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.rtable{width:100%;border-collapse:collapse}
.rtable th{padding:12px 18px;text-align:left;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);background:var(--surface2);border-bottom:1px solid var(--border)}
.rtable td{padding:12px 18px;font-size:14px;border-bottom:1px solid var(--border)}
.rtable tr:last-child td{border-bottom:none}
.rtable tr:hover td{background:rgba(255,255,255,0.02)}
.spill{padding:5px 13px;border-radius:100px;font-size:12.5px;font-weight:700;display:inline-block}
.spill.a{background:rgba(0,201,167,.15);color:var(--teal)}
.spill.b{background:rgba(255,209,102,.15);color:var(--gold)}
.spill.c{background:rgba(255,107,107,.15);color:var(--coral)}
.exp-btn{background:transparent;border:1px solid var(--border);border-radius:7px;padding:5px 12px;font-size:12px;cursor:pointer;color:var(--muted);font-family:'DM Sans',sans-serif;transition:all .15s}
.exp-btn:hover{border-color:var(--teal);color:var(--teal)}
.det-row{display:none}
.det-row.open{display:table-row}
.det-cell{padding:18px 22px;background:rgba(0,0,0,0.2);border-bottom:1px solid var(--border)}
.det-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px}
.det-item{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:10px 13px;font-size:13px}
.det-item .dq{color:var(--muted);font-size:11px;margin-bottom:3px}
.det-item .da{font-weight:500}
.det-item.ok{border-color:rgba(0,201,167,0.4)}
.det-item.bad{border-color:rgba(255,107,107,0.4)}
.det-item.open-q{border-style:dashed}
.aov-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px}
.aov-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 22px;cursor:pointer;transition:border .2s}
.aov-card:hover{border-color:var(--teal)}
.aov-card h4{font-size:14px;font-weight:600;margin-bottom:5px}
.aov-card p{font-size:12px;color:var(--muted)}
.aov-card .aov-num{font-family:'DM Serif Display',serif;font-size:34px;color:var(--teal);margin-top:10px}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-state{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--muted);font-size:15px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:13px 22px;border-radius:12px;font-size:14px;font-weight:500;z-index:9999;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{border-color:var(--teal);color:var(--teal)}
.toast.err{border-color:var(--coral);color:var(--coral)}
@media(max-width:900px){.stats-row{grid-template-columns:1fr 1fr}.vocab-grid,.cat-grid{grid-template-columns:1fr}.aov-grid{grid-template-columns:1fr}.s-sidebar{width:180px}}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>

<!-- LOGIN -->
<div id="login-screen" class="screen active">
  <div class="login-wrap">
    <div class="login-brand">
      <div class="brand-badge"><div class="brand-dot"></div><span>AEP CLASSROOM</span></div>
      <h1>Academic<br><em>English</em> Portal</h1>
      <p>Academic English Programme | Ms Chichi</p>
    </div>
    <div class="login-card">
      <div class="role-switch">
        <button class="role-btn active" onclick="setRole('student')">🎒 Student</button>
        <button class="role-btn" onclick="setRole('teacher')">👩‍🏫 Teacher</button>
      </div>
      <div id="s-fields">
        <div class="field"><label>Your Name</label><input id="sname" type="text" placeholder="e.g. Zhang Wei"/></div>
        <div class="field"><label>Class</label>
          <select id="sclass">
            <option value="">Select your class</option>
            <optgroup label="Year 7"><option>7A</option><option>7B</option><option>7C</option><option>7D</option></optgroup>
            <optgroup label="Year 8"><option>8A</option><option>8B</option><option>8C</option><option>8D</option><option>8E</option><option>8F</option></optgroup>
            <optgroup label="Year 9"><option>9A</option><option>9B</option><option>9C</option><option>9D</option><option>9E</option><option>9F</option></optgroup>
          </select>
        </div>
      </div>
      <div id="t-fields" style="display:none">
        <div class="field"><label>Teacher Name</label><input id="tname" type="text" placeholder="e.g. Ms. Xie"/></div>
        <div class="field"><label>Access Code</label><input id="tcode" type="password" placeholder="Teacher access code"/></div>
      </div>
      <button class="enter-btn" onclick="doLogin()">Enter Classroom →</button>
      <p class="code-note" id="cnote" style="display:none"></p>
    </div>
  </div>
</div>

<!-- STUDENT -->
<div id="student-screen" class="screen">
  <div class="topbar">
    <span class="topbar-logo">AEP</span><div class="topbar-sep"></div><span class="topbar-title">Classroom</span>
    <div class="topbar-right">
      <div class="user-chip"><span class="uc-name" id="u-name"></span><span class="uc-class" id="u-class"></span></div>
      <button class="topbar-btn" onclick="logout()">Sign out</button>
    </div>
  </div>
  <div class="s-layout">
    <nav class="s-sidebar" id="s-sidebar"></nav>
    <div class="s-content" id="s-content"></div>
  </div>
</div>

<!-- TEACHER -->
<div id="teacher-screen" class="screen">
  <div class="topbar">
    <span class="topbar-logo">AEP</span><div class="topbar-sep"></div><span class="topbar-title">Teacher Dashboard</span>
    <div class="topbar-right">
      <div class="user-chip"><span class="uc-name" id="t-name"></span><span class="uc-class" style="color:var(--gold)">Teacher</span></div>
      <button class="topbar-btn" onclick="logout()">Sign out</button>
    </div>

let currentUser=null,currentRole='student',currentAid=ASSIGNMENTS[0].id,mySubmissions=[];

function setRole(r){
  currentRole=r;
  document.querySelectorAll('.role-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&r==='student')||(i===1&&r==='teacher')));
  document.getElementById('s-fields').style.display=r==='student'?'':'none';
  document.getElementById('t-fields').style.display=r==='teacher'?'':'none';
  document.getElementById('cnote').style.display=r==='teacher'?'':'none';
}

async function doLogin(){
  if(currentRole==='student'){
    const name=document.getElementById('sname').value.trim();
    const cls=document.getElementById('sclass').value;
    if(!name)return showToast('Please enter your name','err');
    if(!cls)return showToast('Please select your class','err');
    currentUser={name,class:cls,role:'student'};
    document.getElementById('u-name').textContent=name;
    document.getElementById('u-class').textContent=cls;
    showScreen('student-screen');
    document.getElementById('s-content').innerHTML=`<div class="loading-state"><span class="spinner"></span> Loading your assignments...</div>`;
    try{
      const all=await apiGet();
      mySubmissions=all.filter(s=>s['Student Name']===name&&s['Class']===cls);
    }catch(e){mySubmissions=[];}
    await renderStudentUI();
  } else {
    const name=document.getElementById('tname').value.trim();
    const code=document.getElementById('tcode').value;
    if(!name)return showToast('Please enter your name','err');
    if(code!=='aep2025')return showToast('Incorrect access code','err');
    currentUser={name,role:'teacher'};
    document.getElementById('t-name').textContent=name;
    showScreen('teacher-screen');
    showDash('overview');
  }
}

function logout(){
  currentUser=null;mySubmissions=[];
  ['sname','tname','tcode'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('sclass').value='';
  showScreen('login-screen');
}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

async function renderStudentUI(){
  const sidebar=document.getElementById('s-sidebar');
  sidebar.innerHTML=`<div class="s-sidebar-label">Assignments</div>`+
    ASSIGNMENTS.map(a=>{
      const done=mySubmissions.find(s=>s['Assignment']===a.title);
      return `<div class="s-nav-item${a.id===currentAid?' active':''}" onclick="switchAssignment('${a.id}')">
        <span style="font-size:16px">${a.emoji}</span><span style="flex:1;line-height:1.3">${a.title}</span>
        ${done?'<span class="ni-done"></span>':''}
      </div>`;
    }).join('');
  const a=ASSIGNMENTS.find(x=>x.id===currentAid);
  const existing=mySubmissions.find(s=>s['Assignment']===a.title);
  renderAssignment(a,existing);
}

async function switchAssignment(id){currentAid=id;await renderStudentUI();}

function renderAssignment(a,existing){
  const submitted=!!existing;
  let saved={};
  if(existing){try{saved=JSON.parse(existing['Answers (JSON)']||'{}');}catch(e){}}
  let html=`<div class="a-header"><h2>${a.emoji} ${a.title}</h2><p>${a.subtitle}</p></div>`;

  a.sections.forEach((sec,si)=>{
    html+=`<div class="sec"><div class="sec-title"><span>${sec.emoji}</span> ${sec.title}</div>`;
    if(sec.type==='vocab_chinese'){
      html+=`<div class="vocab-grid">`;
      sec.items.forEach((item,ii)=>{
        const key=`v_${si}_${ii}`,val=saved[key]||'';
        const cls=submitted?(norm(val)===norm(item.answer)?'correct':'incorrect'):'';
        html+=`<div class="vocab-row"><span class="vocab-word">${item.word}</span>
          <input class="v-input ${cls}" data-key="${key}" type="text" placeholder="中文..." value="${esc(val)}" ${submitted?'readonly':''}></div>`;
      });
      html+=`</div>`;
    }
    if(sec.type==='fill_blanks'){
      sec.items.forEach((item,ii)=>{
        let s=item.sentence;
        item.blanks.forEach((_,bi)=>{
          const key=`f_${si}_${ii}_${bi}`,val=saved[key]||'';
          const cls=submitted?(norm(val)===norm(item.key[bi])?'correct':'incorrect'):'';
          s=s.replace('_____',`<input class="b-input ${cls}" data-key="${key}" type="text" value="${esc(val)}" ${submitted?'readonly':''}>`);
        });
        html+=`<div class="sentence-wrap">${s}</div>`;
      });
    }
    if(sec.type==='matching'){
      html+=`<div class="match-grid">`;
      sec.pairs.forEach((p,pi)=>{
        const key=`m_${si}_${pi}`,val=saved[key]||'';
        const cls=submitted?(val===p.answer?'correct':'incorrect'):'';
        const opts=sec.options.map(o=>`<option value="${o.val}" ${val===o.val?'selected':''}>${o.label}</option>`).join('');
        html+=`<div class="match-row2"><div class="match-term">${p.term}</div>
          <div class="match-sel"><select class="${cls}" data-key="${key}" ${submitted?'disabled':''}><option value="">Choose...</option>${opts}</select></div></div>`;
      });
      html+=`</div>`;
    }
    if(sec.type==='mcq'){
      sec.questions.forEach((q,qi)=>{
        const key=`q_${si}_${qi}`,val=saved[key];
        html+=`<div class="mcq-block"><div class="mcq-q">${qi+1}. ${q.q}</div><div class="mcq-opts">`;
        q.options.forEach((opt,oi)=>{
          const chk=val==oi?'checked':'';
          const cls=submitted?(oi===q.answer?'correct':(val==oi&&oi!==q.answer?'incorrect':'')):'';
          html+=`<label class="mcq-opt ${cls}"><input type="radio" name="${key}" value="${oi}" ${chk} ${submitted?'disabled':''}> ${opt}</label>`;
        });
        html+=`</div></div>`;
      });
    }
    if(sec.type==='true_false'){
      sec.items.forEach((item,ii)=>{
        const key=`t_${si}_${ii}`,val=saved[key];
        const cls=submitted?(val===String(item.answer)?'correct':'incorrect'):'';
        const tC=(val==='true')?'sel-t':'',fC=(val==='false')?'sel-f':'';
        html+=`<div class="tf-block ${cls}">
          <span class="tf-stmt">${item.statement}</span>
          <div class="tf-btns">
            <button class="tf-b ${tC}" data-key="${key}" data-val="true" onclick="pickTF(this)" ${submitted?'disabled':''}>True</button>
            <button class="tf-b ${fC}" data-key="${key}" data-val="false" onclick="pickTF(this)" ${submitted?'disabled':''}>False</button>
          </div></div>`;
      });
    }
    if(sec.type==='categorize'){
      html+=`<div class="cat-grid">`;
      sec.items.forEach((item,ii)=>{
        const key=`c_${si}_${ii}`,val=saved[key]||'';
        const cls=submitted?(val===sec.answers[item]?'correct':'incorrect'):'';
        const opts=sec.categories.map(c=>`<option value="${c}" ${val===c?'selected':''}>${c}</option>`).join('');
        html+=`<div class="cat-row"><span class="cat-word">${item}</span>
          <select class="cat-sel ${cls}" data-key="${key}" ${submitted?'disabled':''}><option value="">Category...</option>${opts}</select></div>`;
      });
      html+=`</div>`;
    }
    if(sec.type==='short_answer'){
      sec.questions.forEach((q,qi)=>{
        const key=`s_${si}_${qi}`,val=saved[key]||'';
        html+=`<div class="short-block"><p>${qi+1}. ${q}</p>
          <textarea data-key="${key}" placeholder="Write your answer here..." ${submitted?'readonly':''}>${esc(val)}</textarea></div>`;
      });
    }
    html+=`</div>`;
  });

  if(submitted){
    const pct=existing['Score %'],grade=pct>=85?'hi':pct>=65?'mid':'lo';
    html+=`<div class="submit-area">
      <span class="score-tag ${grade}">${pct}% Score</span>
      <span class="sub-note">Submitted ${existing['Timestamp']}. Short answers reviewed by teacher.</span>
    </div>`;
  } else {
    html+=`<div class="submit-area"><button class="sub-btn" id="sub-btn" onclick="submitWork()">Submit Assignment →</button></div>`;
  }
  document.getElementById('s-content').innerHTML=html;
}

function pickTF(btn){
  document.querySelectorAll(`[data-key="${btn.dataset.key}"]`).forEach(b=>b.classList.remove('sel-t','sel-f'));
  btn.classList.add(btn.dataset.val==='true'?'sel-t':'sel-f');
}

function collectAnswers(){
  const ans={};
  document.querySelectorAll('[data-key]').forEach(el=>{
    if(el.type==='radio'){if(el.checked)ans[el.dataset.key]=el.value;}
    else if(el.tagName==='BUTTON'&&(el.classList.contains('sel-t')||el.classList.contains('sel-f'))){ans[el.dataset.key]=el.dataset.val;}
    else if(el.tagName!=='BUTTON')ans[el.dataset.key]=el.value;
  });
  return ans;
}

function scoreAll(a,answers){
  let tot=0,ok=0;
  a.sections.forEach((sec,si)=>{
    if(sec.type==='vocab_chinese')sec.items.forEach((item,ii)=>{tot++;if(norm(answers[`v_${si}_${ii}`])===norm(item.answer))ok++;});
    if(sec.type==='fill_blanks')sec.items.forEach((item,ii)=>item.key.forEach((k,bi)=>{tot++;if(norm(answers[`f_${si}_${ii}_${bi}`])===norm(k))ok++;}));
    if(sec.type==='matching')sec.pairs.forEach((p,pi)=>{tot++;if(answers[`m_${si}_${pi}`]===p.answer)ok++;});
    if(sec.type==='mcq')sec.questions.forEach((q,qi)=>{tot++;if(Number(answers[`q_${si}_${qi}`])===q.answer)ok++;});
    if(sec.type==='true_false')sec.items.forEach((item,ii)=>{tot++;if(answers[`t_${si}_${ii}`]===String(item.answer))ok++;});
    if(sec.type==='categorize')sec.items.forEach((item,ii)=>{tot++;if(answers[`c_${si}_${ii}`]===sec.answers[item])ok++;});
  });
  return tot>0?ok/tot:0;
}

async function submitWork(){
  const btn=document.getElementById('sub-btn');
  btn.disabled=true;btn.innerHTML=`<span class="spinner"></span> Saving to Google Sheets...`;
  const a=ASSIGNMENTS.find(x=>x.id===currentAid);
  const answers=collectAnswers();
  const score=scoreAll(a,answers);
  try{
    await apiPost({studentName:currentUser.name,studentClass:currentUser.class,assignmentTitle:a.title,score,answers});
    mySubmissions=mySubmissions.filter(s=>s['Assignment']!==a.title);
    mySubmissions.push({'Student Name':currentUser.name,'Class':currentUser.class,'Assignment':a.title,'Score %':Math.round(score*100),'Answers (JSON)':JSON.stringify(answers),'Timestamp':new Date().toLocaleString()});
    showToast(`✓ Saved to Google Sheets! Score: ${Math.round(score*100)}%`,'ok');
    await renderStudentUI();
  }catch(e){
    btn.disabled=false;btn.textContent='Submit Assignment →';
    showToast('Failed to save — check connection','err');
  }
}

async function showDash(tab){
  document.querySelectorAll('.ds-item').forEach(i=>i.classList.remove('active'));
  document.getElementById('dsi-'+tab).classList.add('active');
  document.getElementById('dash-main').innerHTML=`<div class="loading-state"><span class="spinner"></span> Loading from Google Sheets...</div>`;
  let subs=[];
  try{subs=await apiGet();}catch(e){}
  window._dashSubs=subs;
  if(tab==='overview')renderOverview(subs);
  else renderResults(subs);
}

function renderOverview(subs){
  const total=subs.length;
  const students=[...new Set(subs.map(s=>s['Student Name']+'|'+s['Class']))].length;
  const scores=subs.map(s=>Number(s['Score %'])||0);
  const avg=total?Math.round(scores.reduce((a,b)=>a+b,0)/total):0;
  const aCards=ASSIGNMENTS.map(a=>{
    const ss=subs.filter(s=>s['Assignment']===a.title);
    const aavg=ss.length?Math.round(ss.map(s=>Number(s['Score %'])||0).reduce((a,b)=>a+b,0)/ss.length):0;
    return `<div class="aov-card" onclick="showDash('results')">
      <h4>${a.emoji} ${a.title}</h4><p>${a.subtitle}</p>
      <div class="aov-num">${ss.length}</div>
      <p style="font-size:13px;color:var(--muted);margin-top:4px">submissions · avg <strong style="color:var(--teal)">${aavg}%</strong></p>
    </div>`;
  }).join('');
  document.getElementById('dash-main').innerHTML=`
    <h2>Overview</h2>
    <div class="stats-row">
      <div class="stat-c hi"><div class="sl">Submissions</div><div class="sv">${total}</div><div class="ss">Saved in Google Sheets ✓</div></div>
      <div class="stat-c"><div class="sl">Students</div><div class="sv">${students}</div><div class="ss">Unique</div></div>
      <div class="stat-c"><div class="sl">Avg Score</div><div class="sv">${avg}%</div><div class="ss">All assignments</div></div>
      <div class="stat-c"><div class="sl">Assignments</div><div class="sv">${ASSIGNMENTS.length}</div><div class="ss">Active</div></div>
    </div>
    <h2 style="font-size:22px;margin-bottom:16px">By Assignment</h2>
    <div class="aov-grid">${aCards}</div>
    <button class="sub-btn" onclick="showDash('results')">View All Student Results →</button>`;
}

function renderResults(subs,fc='',fa='',fn=''){
  const classes=[...new Set(subs.map(s=>s['Class']))].sort();
  let filtered=subs.filter(s=>
    (!fc||s['Class']===fc)&&(!fa||s['Assignment']===fa)&&
    (!fn||(s['Student Name']||'').toLowerCase().includes(fn.toLowerCase()))
  ).sort((a,b)=>new Date(b['Timestamp'])-new Date(a['Timestamp']));

  const cSel=`<select id="fc"><option value="">All Classes</option>${classes.map(c=>`<option value="${c}" ${fc===c?'selected':''}>${c}</option>`).join('')}</select>`;
  const aSel=`<select id="fa"><option value="">All Assignments</option>${ASSIGNMENTS.map(a=>`<option value="${a.title}" ${fa===a.title?'selected':''}>${a.title}</option>`).join('')}</select>`;
  const nInp=`<input id="fn" type="text" placeholder="Search name..." value="${fn}" style="width:180px">`;
  let rows='';
  if(!filtered.length){
    rows=`<tr><td colspan="6" style="text-align:center;padding:52px;color:var(--muted)">📭 No submissions yet</td></tr>`;
  } else {
    filtered.forEach((sub,idx)=>{
      const pct=Number(sub['Score %'])||0,g=pct>=85?'a':pct>=70?'b':'c';
      const rid=`det-${idx}`;
      rows+=`<tr>
        <td><strong>${sub['Student Name']}</strong></td>
        <td>${sub['Class']}</td><td>${sub['Assignment']}</td>
        <td><span class="spill ${g}">${pct}%</span></td>
        <td>${sub['Timestamp']}</td>
        <td><button class="exp-btn" onclick="toggleDet('${rid}')">Details ▾</button></td>
      </tr>
      <tr class="det-row" id="${rid}"><td class="det-cell" colspan="6">${buildDetail(sub)}</td></tr>`;
    });
  }
  document.getElementById('dash-main').innerHTML=`
    <h2>Student Results</h2>
    <div class="fbar"><label>Filter:</label>${cSel}${aSel}${nInp}
      <button class="filter-btn" onclick="applyFilter()">Apply</button>
      <button class="refresh-btn" onclick="showDash('results')">↻ Refresh</button>
      <span class="fbar-count">${filtered.length} result${filtered.length!==1?'s':''}</span>
    </div>
    <div class="table-wrap">
      <table class="rtable">
        <thead><tr><th>Student</th><th>Class</th><th>Assignment</th><th>Score</th><th>Submitted</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function applyFilter(){
  const fc=document.getElementById('fc')?.value||'';
  const fa=document.getElementById('fa')?.value||'';
  const fn=document.getElementById('fn')?.value||'';
  renderResults(window._dashSubs||[],fc,fa,fn);
}

function buildDetail(sub){
  const a=ASSIGNMENTS.find(x=>x.title===sub['Assignment']);
  if(!a)return`<p style="color:var(--muted)">No detail available</p>`;
  let answers={};try{answers=JSON.parse(sub['Answers (JSON)']||'{}');}catch(e){}
  let items=[];
  a.sections.forEach((sec,si)=>{
    if(sec.type==='vocab_chinese')sec.items.forEach((item,ii)=>{const v=answers[`v_${si}_${ii}`]||'(blank)';items.push({q:item.word,a:v,exp:item.answer,ok:norm(v)===norm(item.answer)});});
    if(sec.type==='fill_blanks')sec.items.forEach((item,ii)=>item.key.forEach((k,bi)=>{const v=answers[`f_${si}_${ii}_${bi}`]||'(blank)';items.push({q:item.sentence.substring(0,40)+'...',a:v,exp:k,ok:norm(v)===norm(k)});}) );
    if(sec.type==='matching')sec.pairs.forEach((p,pi)=>{const v=answers[`m_${si}_${pi}`];items.push({q:p.term,a:v||'(none)',exp:p.answer,ok:v===p.answer});});
    if(sec.type==='mcq')sec.questions.forEach((q,qi)=>{const v=answers[`q_${si}_${qi}`];items.push({q:q.q.substring(0,45)+'...',a:v!=null?q.options[v]:'(none)',exp:q.options[q.answer],ok:Number(v)===q.answer});});
    if(sec.type==='true_false')sec.items.forEach((item,ii)=>{const v=answers[`t_${si}_${ii}`];items.push({q:item.statement.substring(0,50)+'...',a:v||'(none)',exp:String(item.answer),ok:v===String(item.answer)});});
    if(sec.type==='categorize')sec.items.forEach((item,ii)=>{const v=answers[`c_${si}_${ii}`];items.push({q:item,a:v||'(none)',exp:sec.answers[item],ok:v===sec.answers[item]});});
    if(sec.type==='short_answer')sec.questions.forEach((q,qi)=>{const v=answers[`s_${si}_${qi}`]||'(no answer)';items.push({q:q.substring(0,50)+'...',a:v,exp:'Open-ended',ok:null});});
  });
  return`<div class="det-grid">${items.map(item=>`
    <div class="det-item ${item.ok===true?'ok':item.ok===false?'bad':'open-q'}">
      <div class="dq">${item.q}</div>
      <div class="da">${item.a}${item.ok===false?` <span style="color:var(--muted);font-size:11px">→ ${item.exp}</span>`:''}</div>
    </div>`).join('')}</div>`;
}

function toggleDet(id){const r=document.getElementById(id);if(r)r.classList.toggle('open');}
function norm(s){return(s||'').toLowerCase().trim().replace(/[.,!?]/g,'');}
function esc(s){return(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show '+(type||'');
  setTimeout(()=>t.classList.remove('show'),3500);
}
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('login-screen').classList.contains('active'))doLogin();
});
</script>
